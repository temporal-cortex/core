# Temporal Cortex Core — Dependabot Configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Rust dependencies (Cargo)
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    groups:
      rust-minor:
        update-types:
          - minor
          - patch

  # JavaScript dependencies (npm/pnpm)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor:
        update-types:
          - minor
          - patch
    ignore:
      # TypeScript 6.0 is a transition release with breaking changes
      # (moduleResolution: classic removed, esModuleInterop forced,
      # target: ES2023 default, rootDir behavior change). TS 7.0 is
      # coming as a Go rewrite — defer major bumps until then.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci

  # Python dependencies (pip)
  - package-ecosystem: pip
    directory: /crates/temporal-cortex-toon-python
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python
